services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: shared-clipboard-app
    container_name: shared-clipboard-app
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - backend/.env
    volumes:
      - /home/deploy/clipboard-data:/app/data
    restart: unless-stopped
