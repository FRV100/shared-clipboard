name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          envs: GH_PAT,GH_REPO
          script: |
            cd /home/deploy
            rm -rf shared-clipboard || true
            git clone https://${GH_PAT}@github.com/${GH_REPO}.git shared-clipboard

            echo "" > shared-clipboard/backend/.env

            cd shared-clipboard/backend
            docker compose up -d --build
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
